name: Flutter Web Build & Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Git identity
      - name: Set Git Identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      # 3️⃣ Install Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 4️⃣ Install dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 5️⃣ Build Flutter Web
      - name: Build Flutter Web
        run: flutter build web --release --no-tree-shake-icons --base-href "/"

      # 6️⃣ Prepare deploy folder
      - name: Prepare deploy folder
        run: |
          if [ ! -d "build/web" ]; then
            echo "❌ build/web not found!"
            exit 1
          fi

          mkdir -p ${{ runner.temp }}/deploy
          # Copy all files from build/web including hidden files
          cp -r build/web/. ${{ runner.temp }}/deploy/

          # Add Netlify SPA redirect (_redirects)
          echo "/* /index.html 200" > ${{ runner.temp }}/deploy/_redirects
          
          # Add netlify.toml as an alternative redirect configuration
          cat <<EOF > ${{ runner.temp }}/deploy/netlify.toml
          [[redirects]]
            from = "/*"
            to = "/index.html"
            status = 200
          EOF

      # 7️⃣ Deploy to netlify branch
      - name: Deploy to Netlify branch
        run: |
          # Create and switch to netlify branch
          git checkout -B netlify

          # Remove everything except .git to ensure a clean state
          # We use dotglob or a more thorough find to ensure we get everything
          find . -maxdepth 1 ! -name ".git" ! -name "." -exec rm -rf {} +

          # COPY FROM TEMP BACK TO REPO (using . to include hidden files)
          cp -r ${{ runner.temp }}/deploy/. .

          # Verify if index.html exists
          if [ ! -f "index.html" ]; then
            echo "❌ CRITICAL: index.html not found in root of netlify branch!"
            exit 1
          fi

          git add -A
          git commit -m "Netlify Deploy: $(date)" || echo "No changes"
          git push -f origin netlify
